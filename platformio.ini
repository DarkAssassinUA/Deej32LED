[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

; Скорость прошивки через кабель
upload_speed = 460800
; Скорость монитора порта (должна совпадать с Serial.begin в коде)
monitor_speed = 115200

; Авто-сброс не поддерживается этой платой (нет цепи DTR/RTS→EN/GPIO0)
; Перед прошивкой: зажать BOOT, нажать Upload, отпустить BOOT когда начнётся запись
upload_flags =
    --before=no_reset
    --after=hard_reset

lib_deps =
    fastled/FastLED @ ^3.10.3
    https://github.com/mathieucarbou/AsyncTCP
    https://github.com/mathieucarbou/ESPAsyncWebServer
    bblanchon/ArduinoJson @ ^7.0.0

; Нужен больший стек для AsyncTCP задачи
build_flags =
    -D CORE_DEBUG_LEVEL=0
    -D CONFIG_ASYNC_TCP_RUNNING_CORE=1
    -D CONFIG_ASYNC_TCP_STACK_SIZE=4096

; Партиция с местом для WiFi стека
board_build.partitions = min_spiffs.csv

; ============================================================
; OTA-окружение — прошивка по WiFi (ESP32 должен быть в сети)
; Использование: в PlatformIO выбрать env:esp32dev_ota → Upload
; Или: pio run -e esp32dev_ota -t upload
; ============================================================
[env:esp32dev_ota]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

; IP-адрес ESP32 (замените на актуальный из Serial Monitor)
upload_port = 192.168.1.105
upload_protocol = espota
; upload_flags = --auth=your_ota_password  ; раскомментировать если задан пароль OTA

lib_deps =
    fastled/FastLED @ ^3.10.3
    https://github.com/mathieucarbou/AsyncTCP
    https://github.com/mathieucarbou/ESPAsyncWebServer
    bblanchon/ArduinoJson @ ^7.0.0

build_flags =
    -D CORE_DEBUG_LEVEL=0
    -D CONFIG_ASYNC_TCP_RUNNING_CORE=1
    -D CONFIG_ASYNC_TCP_STACK_SIZE=4096

board_build.partitions = min_spiffs.csv